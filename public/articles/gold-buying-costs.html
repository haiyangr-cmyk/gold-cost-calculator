<h1>买黄金前要看哪些费用？</h1>
<p>买黄金不只是看金价，还要综合考虑克重、工费、溢价、折扣和未来回收规则。</p>

<h2>一、基础金价</h2>
<p>基础金价是计算原料成本的核心，但不同门店、品牌和渠道可能存在差异。</p>

<h2>二、克重</h2>
<p>克重决定总原料价格。购买时应确认实际克重，而不是只看款式标签或总价。</p>

<h2>三、手工费</h2>
<p>手工费可能按克计费，也可能按件计费。工艺越复杂，手工费可能越高。</p>

<h2>四、品牌和渠道溢价</h2>
<p>知名品牌、热门款式、商场渠道可能存在额外溢价。对比时应换算为综合单克成本。</p>

<h2>五、回收规则</h2>
<p>如果未来可能卖出，应提前了解不同渠道的回收报价、检测规则和费用。</p>
