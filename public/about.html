<h1>关于本站</h1>
<p>黄金入手成本测算计算器是一个面向普通消费者的黄金成本测算工具，主要服务于黄金首饰、投资金条、婚嫁三金和日常囤金场景。</p>

<h2>我们解决什么问题</h2>
<p>很多消费者买黄金时只关注门店金价，却容易忽略手工费、品牌溢价和渠道费用。本站希望帮助用户快速估算真实入手成本和综合单克成本。</p>

<h2>本站功能</h2>
<ul>
  <li>计算原料价、手工费、溢价、总花费</li>
  <li>计算综合单克成本</li>
  <li>根据预期卖出金价测算毛利和净收益</li>
  <li>本地保存最近测算记录</li>
  <li>生成结果分享卡片</li>
</ul>

<h2>数据处理方式</h2>
<p>本站无登录、无后端接口，核心计算均在浏览器本地完成。</p>
